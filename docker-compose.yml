services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: utcubamba_db
      POSTGRES_USER: utcubamba
      POSTGRES_PASSWORD: utcubamba_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U utcubamba -d utcubamba_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://utcubamba:utcubamba_pass@db:5432/utcubamba_db
      SECRET_KEY: change-this-secret-key-in-production
      ENVIRONMENT: development
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      FRONTEND_URL: http://localhost:9002
      CORS_ORIGINS: http://localhost:9002,http://127.0.0.1:9002
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && uvicorn src.main:app --host 0.0.0.0 --port 8000"

volumes:
  postgres_data:
